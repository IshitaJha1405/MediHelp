<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MediHelp | Smart Medical Assistant</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>


<body>

<header>

<div class="logo">

<img src="logo.png">
<h2>MediHelp</h2>

</div>

<div class="header-right">

<button id="themeBtn">🌙</button>

<button onclick="goToLogin()">Login</button>

</div>

</header>



<section class="hero">

<h1>Your Smart Medical Assistant</h1>

<p>Upload medical reports and get AI-powered health insights.</p>

</section>



<div class="dashboard">

<h2>Upload Medical Report</h2>


<!-- Language -->

<div class="option-group">

<p>Select Language</p>

<button class="lang-btn active" id="enBtn" onclick="setLanguage('english')">English</button>

<button class="lang-btn" id="hiBtn" onclick="setLanguage('hindi')">हिन्दी</button>

</div>


<!-- Report type -->

<div class="option-group">

<p>Select Report Type</p>

<button class="lang-btn active" id="sumBtn" onclick="setReportType('summary')">Summary</button>

<button class="lang-btn" id="detBtn" onclick="setReportType('detailed')">Detailed</button>

</div>


<div class="upload-box">

<input type="file" id="fileUpload" accept=".pdf">

<button onclick="uploadFile()">Analyze</button>

</div>


<div id="result"></div>

<button id="downloadBtn" onclick="downloadPDF()">Download Report</button>

</div>


<footer>

<p>© 2026 MediHelp | AI Powered Healthcare</p>

</footer>


<script src="script.js"></script>

</body>
</html>
